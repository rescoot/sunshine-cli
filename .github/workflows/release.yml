name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          OUTPUT="sunshine-${GOOS}-${GOARCH}${EXT}"
          go build -ldflags "-X github.com/rescoot/sunshine-cli/cmd.Version=${GITHUB_REF_NAME}" -o "$OUTPUT" .

      - uses: actions/upload-artifact@v4
        with:
          name: sunshine-${{ matrix.goos }}-${{ matrix.goarch }}
          path: sunshine-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          chmod +x sunshine-linux-* sunshine-darwin-* || true
          gh release create "$TAG" sunshine-* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes
